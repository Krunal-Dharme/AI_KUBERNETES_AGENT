apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: ai-agent-test
  labels:
    app: api-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: nginx:does-not-exist-tag-99999
