apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: ai-agent-test
  labels:
    app: web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
        version: v1
    spec:
      containers:
        - name: web
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: ai-agent-test
spec:
  selector:
    app: web-app
    version: v2
  ports:
    - port: 80
      targetPort: 80
