apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ai-agent-test
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ -z "$DATABASE_URL" ]; then
                echo "ERROR: DATABASE_URL environment variable is missing"
                exit 1
              fi
              sleep 3600
