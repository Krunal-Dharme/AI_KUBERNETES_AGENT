# Run on GCP VM pipeline-demo where kubeconfig and gcloud auth already work.
#
#   docker compose -f docker-compose.yml -f docker-compose.gke.yml up --build
#
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.gke
    volumes:
      - ${HOST_KUBECONFIG_PATH:-/var/lib/jenkins/.kube/config}:/kube/config:ro
      - ${HOST_GCLOUD_CONFIG_PATH:-/var/lib/jenkins/.config/gcloud}:/root/.config/gcloud:ro
    environment:
      KUBECONFIG_PATH: /kube/config
      CLOUDSDK_CONFIG: /root/.config/gcloud
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
      GKE_VALIDATE_ON_STARTUP: "true"
      KUBECTL_SSH_HOST: ""
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://34.47.189.50:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://34.47.189.50:8000
    ports:
      - "3000:3000"
